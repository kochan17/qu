# Render Blueprint — Que (Rails 8)
# 使い方: Render Dashboard → New → Blueprint → このリポジトリ (kochan17/qu) を選択。
# RAILS_MASTER_KEY だけ手動入力が必要（qu-rails/config/master.key の中身）。
databases:
  - name: qu-db
    plan: free
    region: singapore
    databaseName: qu_production
    user: qu

services:
  - type: web
    name: qu
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./qu-rails/Dockerfile
    dockerContext: ./qu-rails
    healthCheckPath: /up
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qu-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: WEB_CONCURRENCY
        value: "1"
      - key: RAILS_MAX_THREADS
        value: "3"
